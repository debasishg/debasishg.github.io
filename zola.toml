# The URL the site will be built for
base_url = "https://debasishg.github.io"
title = "Ruminations of a Programmer"
description = "Programming, some math and technical deep dives"
theme = "zolarwind"

# Whether to automatically compile all Sass files in the sass directory
compile_sass = true

# Whether to build a search index to be used later on by a JavaScript library
build_search_index = true
generate_feeds = true
default_language = "en"

taxonomies = [
    { name = "tags", paginate_by = 10, feed = true },
]

[markdown]

[markdown.highlighting]
theme = "everforest-light"
dark_theme = "github-dark"
style = "class"
error_on_missing_language = true

[extra]
# Put all your custom variables here
title = "Ruminations of a Programmer"
path_language_resources = "themes/zolarwind/i18n/"
site_description = "Technical blog focused on systems programming and code"
code_background = "light"

# Homepage intro
home_intro = """
Programmer. Author: **Functional and Reactive Domain Modeling** (Manning 2016), **DSLs In Action** (Manning 2010).
Father. Husband. Seinfeld fanboy. FP aficionado.
"""

# Navigation Menu (This makes "Blog" appear and show your posts)
# ==================== NAVIGATION MENU ====================
menu_pages = [
    { title = "Home",  url = "/" },
    { title = "Blog",  url = "/blog/" },
    { title = "Tags",  url = "/tags/" },
]

